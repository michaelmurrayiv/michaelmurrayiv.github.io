    </head>

        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">

    <body>
        <nav class="navbar">
            <h1 class="logo"><a href="index.html">michael's website</a></h1>

              <li><a href="index.html">Home</a></li>

        <main>
            <h1 class="page-title">Contact</h1>
            <form class="contact-class" id="contact-form">
                <label for="name"> Name: </label>
                <input type="text" id="name" name="name" placeholder="Name" required />
                <label for="email"> Email: </label>
                <input type="email" id="email" name="email" placeholder="Email" />
                <label for="message"> Message: </label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="Message"
                    required
                ></textarea>
                <input type="submit" value="Submit" />
            </form>
            <p id="form-response" style="display:none;">Thank you for your message, I will email you back soon!</p> <!-- Success message -->
        </main>
        <footer class="footer">
